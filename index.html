/* ===== state ===== */
let lang = localStorage.getItem('shoulda_lang') || 'ko';
function seedAmount(){ return lang==='ko' ? 1000000 : 1000; }   // default(1배) 기준 시드
const SEED_MULTS = [0.1, 0.5, 1, 5, 10];                        // default 대비 배수
function curSym(){ return lang==='ko' ? '₩' : '$'; }
let state = { cat:null, item:null, bi:0, si:1, seed:seedAmount(), balance:seedAmount(), round:1, last:null };

function fmtMoney(v){ return curSym() + Math.round(v).toLocaleString(lang==='ko'?'ko-KR':'en-US'); }
function fmtPrice(p, item){
  const s = lang==='ko'?item.unit.ko:item.unit.en;
  const sym = {USD:'$',KRW:'₩',JPY:'¥',GBP:'£',HKD:'HK$',SGD:'S$',AED:'AED '}[item.cur]||'';
  const num = p>=100 ? Math.round(p).toLocaleString() : (p>=1 ? p.toFixed(2) : p.toPrecision(2));
  return `${sym}${num} ${s}`;
}
function t(k){ return I[lang][k]; }
function track(name, params){ try{ gtag('event', name, params||{}); }catch(e){} }

/* ===== render ===== */
const app = document.getElementById('app');
function render(){
  if(state.cat===null) return renderHome();
  if(state.cat==='__pick') return renderCats();
  if(!state.item) return renderItems();
  if(state.last==null) return renderTiming();
  return renderResult();
}

function renderHome(){
  const chips = SEED_MULTS.map(m=>{
    const val = seedAmount()*m;
    const active = Math.abs(state.seed - val) < 0.5;
    const isDefault = m===1;
    return `<button class="seedchip${active?' on':''}" data-seed="${val}">${fmtMoney(val)}${isDefault?` <span class="def">·default</span>`:''}</button>`;
  }).join('');
  app.innerHTML = `
    <section class="step hero">
      ${parrotSVG()}
      <p class="eyebrow">OnlyOne</p>
      <h1>${t('heroTitle')}</h1>
      <p class="sub">${t('heroSub')}</p>
      <div class="seedpick">
        <p class="seedpick-lab">${t('seedPick')}</p>
        <div class="seedchips">${chips}</div>
      </div>
      <div class="row" style="margin-top:20px">
        <button class="btn btn-primary" id="startBtn">${t('start')}</button>
      </div>
    </section>`;
  app.querySelectorAll('.seedchip').forEach(b=> b.onclick = ()=>{
    state.seed = +b.dataset.seed; state.balance = state.seed;
    track('shoulda_seed',{seed:Math.round(state.seed)});
    renderHome();
  });
  document.getElementById('startBtn').onclick = ()=>{
    state.balance = state.seed;
    track('shoulda_start',{seed:Math.round(state.seed)});
    state.cat='__pick'; render();
  };
}

function renderCats(){
  const cards = Object.entries(DATA).map(([k,c])=>`
    <button class="card" data-cat="${k}">
      <span class="emoji">${c.emoji}</span>
      <span class="nm">${c.name[lang]}</span>
      <span class="meta">${c.items.length}</span>
    </button>`).join('');
  app.innerHTML = `
    <section class="step">
      <button class="back" id="backHome">← ${t('back')}</button>
      <h2 class="sectitle">${t('pickCat')}</h2>
      <p class="secsub">${t('pickCatSub')}</p>
      <div class="grid">${cards}</div>
    </section>`;
  document.getElementById('backHome').onclick = ()=>{ state.cat=null; render(); };
  app.querySelectorAll('.card').forEach(b=> b.onclick = ()=>{
    state.cat=b.dataset.cat; track('shoulda_category',{category:state.cat}); render();
  });
}

function renderItems(){
  const c = DATA[state.cat];
  const list = c.items.map(it=>{
    return `<button class="item" data-id="${it.id}">
      <span class="nm">${it.name[lang]}</span>
      <span class="go">›</span>
    </button>`;
  }).join('');
  app.innerHTML = `
    <section class="step">
      <button class="back" id="backCat">← ${t('back')}</button>
      <div class="crumb"><b>${c.name[lang]}</b></div>
      <h2 class="sectitle">${t('pickItem')}</h2>
      <p class="secsub">${t('pickItemSub')}</p>
      <div class="list">${list}</div>
    </section>`;
  document.getElementById('backCat').onclick = ()=>{ state.cat='__pick'; render(); };
  app.querySelectorAll('.item').forEach(b=> b.onclick = ()=>{
    state.item = c.items.find(x=>x.id===b.dataset.id);
    state.bi=0; state.si=state.item.series.length-1; state.last=null;
    track('shoulda_item',{category:state.cat, item:state.item.id});
    render();
  });
}

function renderTiming(){
  const c=DATA[state.cat], it=state.item, S=it.series, N=S.length;
  app.innerHTML = `
    <section class="step">
      <button class="back" id="backItem">← ${t('back')}</button>
      <div class="crumb"><b>${c.name[lang]}</b><span class="sep">›</span><b>${it.name[lang]}</b></div>
      <h2 class="sectitle">${t('timingTitle')}</h2>
      <p class="secsub">${t('timingSub')}</p>
      <div class="panel">
        <div class="sliderbox">
          <div class="track"></div><div class="fill" id="fill"></div>
          <input type="range" class="thumb-buy"  id="buy"  min="0" max="${N-1}" step="1" value="${state.bi}">
          <input type="range" class="thumb-sell" id="sell" min="0" max="${N-1}" step="1" value="${state.si}">
        </div>
        <div class="axis"><span>${S[0][0]}</span><span>${S[N-1][0]}</span></div>
        <div class="legs">
          <div class="leg"><div class="lab"><span class="dot" style="background:var(--gain)"></span>${t('buy')}</div>
            <div class="dt" id="buyDate"></div></div>
          <div class="leg"><div class="lab"><span class="dot" style="background:var(--loss)"></span>${t('sell')}</div>
            <div class="dt" id="sellDate"></div></div>
        </div>
        <p class="seedline">${t('seed')}: <b>${fmtMoney(state.balance)}</b>${state.round>1?` · ${t('round')} ${state.round}`:''}</p>
        <div class="row" style="margin-top:6px"><button class="btn btn-primary" id="calcBtn">${t('seeResult')}</button></div>
      </div>
      <p class="secsub" style="margin-top:14px; font-size:12.5px">${t('source')}: ${it.source}</p>
      <p class="secsub" style="font-size:12px">${t('disclaimer')}</p>
    </section>`;
  document.getElementById('backItem').onclick = ()=>{ state.item=null; render(); };

  const buy=document.getElementById('buy'), sell=document.getElementById('sell');
  const sync=()=>{
    let bi=+buy.value, si=+sell.value;
    if(bi>si){ if(document.activeElement===buy){ si=bi; sell.value=si; } else { bi=si; buy.value=bi; } }
    state.bi=bi; state.si=si;
    const fill=document.getElementById('fill');
    fill.style.left=(bi/(N-1)*100)+'%'; fill.style.width=((si-bi)/(N-1)*100)+'%';
    document.getElementById('buyDate').textContent=S[bi][0];
    document.getElementById('sellDate').textContent=S[si][0];
  };
  buy.oninput=sync; sell.oninput=sync; sync();
  document.getElementById('calcBtn').onclick=()=>{ computeResult(); render(); };
}

function drawResultChart(it,bi,si){
  const S=it.series, N=S.length, w=320,h=150, pad=10, padTop=16;
  const ps=S.map(p=>p[1]), mn=Math.min(...ps), mx=Math.max(...ps);
  const hiIdx=ps.indexOf(mx), loIdx=ps.indexOf(mn);
  const X=i=> pad + i/(N-1)*(w-2*pad);
  const Y=v=> mx===mn? h/2 : (h-pad) - (v-mn)/(mx-mn)*(h-pad-padTop);
  const line=S.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(p[1]).toFixed(1)}`).join(' ');
  // 매수→매도 음영
  let region='';
  if(si>bi){
    let d=`M${X(bi)},${h-pad} `;
    for(let i=bi;i<=si;i++) d+=`L${X(i).toFixed(1)},${Y(S[i][1]).toFixed(1)} `;
    d+=`L${X(si)},${h-pad} Z`;
    const up=S[si][1]>=S[bi][1];
    region=`<path d="${d}" fill="${up?'rgba(31,143,78,.12)':'rgba(217,72,59,.12)'}"/>`;
  }
  const dot=(i,col,rr)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(S[i][1]).toFixed(1)}" r="${rr||5}" fill="#fff" stroke="${col}" stroke-width="3"/>`;
  // 최고/최저 마커 (작은 다이아몬드)
  const mark=(i,col)=>{ const cx=X(i), cy=Y(S[i][1]);
    return `<path d="M${cx},${(cy-6).toFixed(1)} L${(cx+5).toFixed(1)},${cy.toFixed(1)} L${cx},${(cy+6).toFixed(1)} L${(cx-5).toFixed(1)},${cy.toFixed(1)} Z" fill="${col}"/>`; };
  document.getElementById('resultChart').innerHTML =
    region
    + `<path d="${line}" fill="none" stroke="#1d1d1f" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`
    + mark(hiIdx,'#c8a24a') + mark(loIdx,'#6e6e73')
    + dot(bi,'#1f8f4e') + dot(si,'#d9483b');
  document.getElementById('hiDate').textContent=S[hiIdx][0];
  document.getElementById('hiPrice').textContent=fmtPrice(mx,it);
  document.getElementById('loDate').textContent=S[loIdx][0];
  document.getElementById('loPrice').textContent=fmtPrice(mn,it);
}

function computeResult(){
  const S=state.item.series, bp=S[state.bi][1], sp=S[state.si][1];
  const mult = bp>0 ? sp/bp : 1, ret=(mult-1)*100;
  const before=state.balance, after=before*mult;
  const grade=pickGrade(ret);
  state.last={ret, before, after, bp, sp, bd:S[state.bi][0], sd:S[state.si][0], grade};
  state.balance=after;
  track('shoulda_result',{category:state.cat, item:state.item.id, grade:grade.g, ret:Math.round(ret), bankrupt:!!grade.bankrupt});
}
function pickGrade(ret){ for(const g of GRADES){ if(ret>=g.min) return g; } return GRADES[GRADES.length-1]; }

function renderResult(){
  const r=state.last, g=r.grade, gain=r.ret>=0, it=state.item, c=DATA[state.cat];
  const retStr=(r.ret>=0?'+':'')+r.ret.toFixed(1)+'%';
  app.innerHTML = `
    <section class="step">
      <div class="result">
        <div class="gradechip" style="background:${g.color}">${g.g}</div>
        <p class="rtitle">${g[lang].t}</p>
        <div class="rnum" style="color:${gain?'var(--gain)':'var(--loss)'}">${retStr}</div>
        <p class="rbal">${t('finalBal')}: <b>${fmtMoney(r.after)}</b>${state.round>1?` · ${t('round')} ${state.round}`:''}</p>
        <p class="rdesc">${g[lang].d}</p>
        <p class="rsquawk">${g[lang].sq}</p>
        <p class="tag">${c.name[lang]} · ${it.name[lang]} · ${r.bd} → ${r.sd}</p>
      </div>
      <div class="panel" style="margin-top:14px">
        <p class="secsub" style="margin:0 0 8px; font-size:13px">${t('priceChart')} · ${it.name[lang]}</p>
        <svg class="chart" id="resultChart" viewBox="0 0 320 150" preserveAspectRatio="none"></svg>
        <div class="axis"><span>${it.series[0][0]}</span><span>${it.series[it.series.length-1][0]}</span></div>
        <div class="legs" style="margin-top:10px">
          <div class="leg"><div class="lab"><span class="dot" style="background:var(--gain)"></span>${t('buy')}</div>
            <div class="dt">${r.bd}</div><div class="pr">${fmtPrice(r.bp,it)}</div></div>
          <div class="leg"><div class="lab"><span class="dot" style="background:var(--loss)"></span>${t('sell')}</div>
            <div class="dt">${r.sd}</div><div class="pr">${fmtPrice(r.sp,it)}</div></div>
        </div>
        <div class="legs" style="margin-top:8px">
          <div class="leg"><div class="lab"><span class="dot" style="background:var(--gold)"></span>${t('high')}</div>
            <div class="dt" id="hiDate"></div><div class="pr" id="hiPrice"></div></div>
          <div class="leg"><div class="lab"><span class="dot" style="background:var(--muted)"></span>${t('low')}</div>
            <div class="dt" id="loDate"></div><div class="pr" id="loPrice"></div></div>
        </div>
        <p class="secsub" style="margin:12px 0 0; font-size:11.5px">${t('source')}: ${it.source}</p>
      </div>
      <div class="row" style="margin-top:18px">
        ${ g.bankrupt
            ? `<button class="btn btn-primary" id="againBtn">${t('again')}</button>`
            : (gain
                ? `<button class="btn btn-primary" id="reinvestBtn">${t('reinvest')}</button>
                   <button class="btn btn-ghost" id="restartBtn">${t('restart')}</button>`
                : `<button class="btn btn-primary" id="restartBtn">${t('restart')}</button>`) }
      </div>
      <div class="row" style="margin-top:10px">
        <button class="btn btn-ghost" id="saveBtn">${t('save')}</button>
        <button class="btn btn-ghost" id="shareBtn">${t('share')}</button>
      </div>
    </section>`;
  const reinvest=document.getElementById('reinvestBtn');
  if(reinvest) reinvest.onclick=()=>{ track('shoulda_reinvest',{round:state.round}); state.round++; state.item=null; state.last=null; state.cat='__pick'; render(); };
  const again=document.getElementById('againBtn'); if(again) again.onclick=resetAll;
  const restart=document.getElementById('restartBtn'); if(restart) restart.onclick=resetAll;
  document.getElementById('saveBtn').onclick=()=>{ track('shoulda_share',{type:'image',grade:g.g}); saveImage(); };
  document.getElementById('shareBtn').onclick=()=>{ track('shoulda_share',{type:'native',grade:g.g}); shareResult(retStr,g.g); };
  drawResultChart(it, state.bi, state.si);
}
function resetAll(){ state={cat:'__pick', item:null, bi:0, si:1, seed:state.seed, balance:state.seed, round:1, last:null}; render(); }

/* ===== share / save ===== */
function shareResult(retStr,g){
  const text=I[lang].shareText(g,retStr), url=location.href;
  if(navigator.share){ navigator.share({title:t('heroTitle'),text,url}).catch(()=>{}); }
  else { navigator.clipboard&&navigator.clipboard.writeText(text+' '+url); toast(t('copied')); }
}
function saveImage(){
  const r=state.last, g=r.grade, it=state.item, c=DATA[state.cat];
  const W=1080,H=1080, cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const x=cv.getContext('2d');
  x.fillStyle='#f5f5f7'; x.fillRect(0,0,W,H);
  x.fillStyle='#fff'; roundRect(x,90,150,900,780,40); x.fill();
  x.strokeStyle='rgba(0,0,0,.08)'; x.lineWidth=2; roundRect(x,90,150,900,780,40); x.stroke();
  x.fillStyle=g.color; x.beginPath(); x.arc(W/2,330,90,0,7); x.fill();
  x.fillStyle='#fff'; x.textAlign='center'; x.textBaseline='middle';
  x.font='700 96px Pretendard, sans-serif'; x.fillText(g.g, W/2, 338);
  x.fillStyle='#1d1d1f'; x.font='700 46px Pretendard, sans-serif'; x.fillText(g[lang].t, W/2, 470);
  const retStr=(r.ret>=0?'+':'')+r.ret.toFixed(1)+'%';
  x.fillStyle=r.ret>=0?'#1f8f4e':'#d9483b'; x.font='800 110px Pretendard, sans-serif'; x.fillText(retStr, W/2, 580);
  x.fillStyle='#6e6e73'; x.font='400 34px Pretendard, sans-serif'; x.fillText(`${t('finalBal')}: ${fmtMoney(r.after)}`, W/2, 660);
  x.fillStyle='#1d1d1f'; x.font='600 36px Pretendard, sans-serif'; x.fillText(`${c.name[lang]} · ${it.name[lang]}`, W/2, 730);
  x.fillStyle='#6e6e73'; x.font='400 30px Pretendard, sans-serif'; x.fillText(`${r.bd} → ${r.sd}`, W/2, 778);
  x.fillStyle='#1d1d1f'; x.font='400 30px Pretendard, sans-serif'; wrapText(x, g[lang].d, W/2, 838, 760, 40);
  x.fillStyle='#3a3f47'; x.font='700 38px Pretendard, sans-serif'; x.fillText('🦜 '+t('heroTitle')+'  ·  OnlyOne', W/2, 1000);
  cv.toBlob(b=>{
    const file=new File([b],'shoulda.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})) navigator.share({files:[file], title:t('heroTitle')}).catch(()=>download(b));
    else download(b);
  },'image/png');
}
function download(b){ const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='shoulda.png'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000); }
function roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function wrapText(c,text,cx,y,maxw,lh){ const words=(text+'').split(' '); let line='',yy=y;
  for(const w of words){ const test=line+w+' '; if(c.measureText(test).width>maxw && line){ c.fillText(line.trim(),cx,yy); line=w+' '; yy+=lh; } else line=test; }
  c.fillText(line.trim(),cx,yy); }
function toast(msg){ const d=document.createElement('div'); d.textContent=msg;
  d.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 18px;border-radius:999px;font-size:14px;z-index:80;opacity:0;transition:opacity .2s';
  document.body.appendChild(d); requestAnimationFrame(()=>d.style.opacity='1'); setTimeout(()=>{d.style.opacity='0'; setTimeout(()=>d.remove(),300);},1600); }

};
document.getElementById('brandLink').onclick = ()=> track('onlyone_click',{from:'shoulda'});

/* consent */
const consent=document.getElementById('consent');
function setConsent(granted){
  gtag('consent','update',{ ad_storage:'denied', ad_user_data:'denied', ad_personalization:'denied', analytics_storage: granted?'granted':'denied' });
  localStorage.setItem('shoulda_consent', granted?'1':'0');
  consent.classList.remove('show');
}
document.getElementById('acceptBtn').onclick=()=>setConsent(true);
document.getElementById('declineBtn').onclick=()=>setConsent(false);
(function(){ const c=localStorage.getItem('shoulda_consent');
  if(c==='1') setConsent(true); else if(c==='0') setConsent(false); else consent.classList.add('show'); })();

/* privacy modal */
const pm=document.getElementById('privacyModal');
document.getElementById('openPrivacy').onclick=()=>pm.classList.add('show');
document.getElementById('closePrivacy').onclick=()=>pm.classList.remove('show');
pm.onclick=e=>{ if(e.target===pm) pm.classList.remove('show'); };

/* boot */
applyChrome();
render();
</script>
</body>
</html>
